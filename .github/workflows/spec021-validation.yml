name: spec021-validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-spec-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate SPEC_021 artifacts
        run: python scripts/spec_021/validate_spec021_artifacts.py

  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest-cov

      - name: Run quality gate
        run: python scripts/spec_021/check_quality_gate.py

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec021-quality-artifacts
          path: reports/

  hardening-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run hardening checks
        run: python scripts/spec_021/check_hardening.py

      - name: Upload hardening artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec021-hardening-artifacts
          path: reports/spec021_hardening_report.json

  soak-evidence-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate soak evidence
        run: python scripts/spec_021/validate_soak_evidence.py

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec021-soak-artifacts
          path: docs/SDD/SPEC_021_VALIDACAO_OPERACIONAL_RESILIENCIA/evidence/
