# nginx.conf — Configuração para servir SPA Phicube Dashboard
# Proxy reverso para API backend + cache strategy + segurança

upstream api_backend {
    server phicube-dashboard-api:8080;
}

# Compressão gzip
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
gzip_min_length 256;
gzip_vary on;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' /api/; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Health endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"phicube-frontend"}';
        add_header Content-Type application/json;
    }

    # Cache para assets estáticos (com hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — tudo que não é asset vai para index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html não deve ser cacheado (sempre fresh)
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Proxy para API backend
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Negar acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Negar acesso a arquivos sensíveis
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
