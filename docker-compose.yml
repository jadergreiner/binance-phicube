services:

  # ─── Bot (robô de trading) ────────────────────────────────────────────────
  phicube:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: phicube-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - phicube-net
    volumes:
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Dashboard API (FastAPI + frontend) ──────────────────────────────────
  dashboard-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: phicube-dashboard-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - phicube-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── MongoDB (banco de dados) ────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: phicube-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-}
    volumes:
      - mongo_data:/data/db
    networks:
      - phicube-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Mongo Express (UI de administração — remova em produção) ─────────────
  mongo-express:
    image: mongo-express:1
    container_name: phicube-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: changeme
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - phicube-net
    profiles:
      - dev

volumes:
  mongo_data:
    driver: local

networks:
  phicube-net:
    driver: bridge
