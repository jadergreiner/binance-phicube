# Prometheus configuration for Phicube trading bot
# SPEC_032 - Observabilidade com Prometheus e Grafana

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'phicube-monitor'

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Bot de trading (porta 8000)
  - job_name: 'phicube-bot'
    static_configs:
      - targets: ['phicube:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Dashboard API (porta 8080)
  - job_name: 'dashboard-api'
    static_configs:
      - targets: ['dashboard-api:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
